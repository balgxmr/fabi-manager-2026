name: Build, Push & Deploy to ACI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: fabi-manager

permissions:
  id-token: write # Requerido para la autenticación segura por OIDC con tu identidad administrada
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (production)
        run: npm run build

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless --no-progress
        continue-on-error: true

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build & tag Docker image
        run: |
          IMAGE_TAG="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${{ github.sha }}"
          docker build -t $IMAGE_TAG .

      - name: Push image to ACR
        run: |
          IMAGE_TAG="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${{ github.sha }}"
          docker push $IMAGE_TAG

      # =========================================================================
      # DESPLIEGUE AUTENTICADO CON TU NUEVA IDENTIDAD ADMINISTRADA
      # =========================================================================

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: "bc14b145-89e9-44ac-97c6-91113ddd19f7"
          tenant-id: "f07b40ae-b60b-4e0f-bebe-afb42fc4dc69"
          subscription-id: "8f3bca61-83a3-4743-8739-dad358684a9f"
          auth-type: IDENTITY

      - name: Deploy to Azure Container Instances (ACI)
        uses: azure/aci-deploy@v1
        with:
          resource-group: ProyectoFinalTopicos
          location: eastus2
          vnet: proyectofinal-vnet
          subnet: proyectofinal-subnet-aci
          name: fabi-manager-service
          image: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          registry-login-server: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.AZURE_ACR_USERNAME }}
          registry-password: ${{ secrets.AZURE_ACR_PASSWORD }}
          ports: 80                                        
          dns-name-label: fabi-manager-app-2026            
          environment-variables: |                         
            NODE_ENV=production
            PORT=80

      - name: Validar acceso HTTP
        run: |
          echo "Esperando 20 segundos a que el contenedor termine de levantar..."
          sleep 20
          curl -f http://fabi-manager-app-2026.eastus2.azurecontainer.io || exit 1
          echo "¡Aplicación desplegada y respondiendo con éxito!"
