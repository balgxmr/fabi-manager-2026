name: Build, Push & Deploy to ACI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: fabi-manager

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (production)
        run: npm run build

      - name: Run tests
        run: npx ng test --watch=false --browsers=ChromeHeadless --no-progress
        continue-on-error: true

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build & tag Docker image
        run: |
          IMAGE_TAG="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${{ github.sha }}"
          docker build -t $IMAGE_TAG .

      - name: Push image to ACR
        run: |
          IMAGE_TAG="${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${{ github.sha }}"
          docker push $IMAGE_TAG

      # =========================================================================
      # DESPLIEGUE SEGURO MEDIANTE CONTEXTO DOCKER ACI (EVITA EL ERROR DE CREDENTIALS)
      # =========================================================================

      - name: Desplegar en ACI usando contexto de Docker
        run: |
          # 1. Crear un contexto de Docker apuntando directamente a tu recurso de Azure usando tus secretos existentes
          docker context create aci mi-contexto-azure \
            --subscription-id "8f3bca61-83a3-4743-8739-dad358684a9f" \
            --resource-group "ProyectoFinalTopicos" \
            --location "eastus2"
          
          # 2. Ordenar a Docker ejecutar el contenedor en Azure usando la red virtual indicada
          docker --context mi-contexto-azure run -d \
            --name fabi-manager-service \
            --vnet "proyectofinal-vnet" \
            --subnet "proyectofinal-subnet-aci" \
            -p 80:80 \
            -e NODE_ENV=production \
            -e PORT=80 \
            "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      # 2. Validar que la aplicación responda (Smoke Test)
      - name: Validar acceso HTTP
        run: |
          echo "Esperando 20 segundos a que el contenedor termine de levantar..."
          sleep 20
          curl -f http://fabi-manager-app-2026.eastus2.azurecontainer.io || exit 1
          echo "¡Aplicación desplegada y respondiendo con éxito!"
