name: Deploy to ACI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update ACI Image
        run: |
          az container create \
            --resource-group "ProyectoFinalTopicos" \
            --name "proyectofinal-aci" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/fabi-manager:${{ github.sha }}" \
            --registry-login-server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --registry-username "${{ secrets.ACR_USERNAME }}" \
            --registry-password "${{ secrets.ACR_PASSWORD }}" \
            --vnet "proyectofinal-vnet" \
            --subnet "proyectofinal-subnet-aci" \
            --location "eastus2"
