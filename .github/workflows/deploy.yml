    steps:

    # 1. Conectarse a Azure e iniciar el despliegue en ACI usando las credenciales del ACR
    # Reemplaza 'tu-grupo-de-recursos' por el nombre real que tiene en tu Azure
    - name: Desplegar contenedor en Azure Container Instances
      uses: azure/aci-deploy@v1
      with:
        resource-group: tu-grupo-de-recursos 
        location: eastus
        name: fabi-manager-service
        image: proyectofinalacr.azurecr.io/fabi-manager:4dd8f2fe165308ed1375de97844e61469395aeca
