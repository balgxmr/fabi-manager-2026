name: "Pipeline 3: Despliegue a ACI"

on:
  push:
    branches: [main] 
  workflow_dispatch: 

permissions:
  id-token: write 
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
  
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: "bc14b145-89e9-44ac-97c6-91113ddd19f7"
          tenant-id: "f07b40ae-b60b-4e0f-bebe-afb42fc4dc69"
          subscription-id: "8f3bca61-83a3-4743-8739-dad358684a9f"
          auth-type: IDENTITY 

    
      - name: Deploy to Azure Container Instances (ACI)
        uses: azure/aci-deploy@v1
        with:
          resource-group: ProyectoFinalTopicos
          location: eastus2
          vnet: proyectofinal-vnet               # Tu VNet del Pipeline 1
          subnet: proyectofinal-subnet-aci       # Tu Subred del Pipeline 1
          name: proyectofinal-aci
          image: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/fabi-manager:${{ github.sha }}
          registry-login-server: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.AZURE_ACR_USERNAME }}
          registry-password: ${{ secrets.AZURE_ACR_PASSWORD }}
          ports: 80                                        
          environment-variables: |                         
            NODE_ENV=production
            PORT=80

      - name: Verificar estado del contenedor
        run: |
          echo "Consultando el estado de la instancia en Azure..."
          az container show --resource-group ProyectoFinalTopicos --name proyectofinal-aci --query "instanceView.state" --output table
          echo "¡El Pipeline 3 se ha completado correctamente y el contenedor está en ejecución!"
