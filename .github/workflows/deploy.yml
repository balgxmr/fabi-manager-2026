Para cumplir con el Punto 3: Desplegar el contenedor en Azure Container Instances (ACI), necesitas configurar un pipeline de despliegue (probablemente en GitHub Actions, dado que tienes un link de GitHub) que tome la imagen que ya está construida y publicada en tu Azure Container Registry (ACR) y la levante en ACI.

Asumiendo que la infraestructura del punto 1 (VNet, ACR, ACI inicial, y los permisos) ya está creada, aquí tienes los pasos y el ejemplo de cómo estructurar tu archivo de flujo de trabajo para lograrlo.

Pasos para realizar el Pipeline 3 (Despliegue)
1. Preparar las Credenciales en GitHub
Para que tu pipeline pueda desplegar en Azure, necesitas darle permisos. Lo ideal es crear un Service Principal en Azure y guardar sus datos en los Secrets de tu repositorio de GitHub (Settings > Secrets and variables > Actions):

AZURE_CREDENTIALS: Un JSON con el Service Principal (con rol de Contributor o AcrPull / Contributor en el grupo de recursos).

REGISTRY_USERNAME: El ID de cliente o el usuario administrador de tu ACR (proyectofinalacr).

REGISTRY_PASSWORD: La contraseña/secret del Service Principal o la clave de administrador de tu ACR.

2. Estructura del Pipeline de Despliegue (GitHub Actions)
Debes crear (o añadir a tu archivo existente) un archivo .github/workflows/deploy.yml. Aquí tienes una plantilla basada exactamente en los requerimientos de tu imagen para cumplir con el Pipeline 3:

YAML
name: Pipeline 3 - Despliegue a ACI

on:
  workflow_run:
    workflows: ["Pipeline 2 - Construcción y publicación"] # Se ejecuta tras compilar, o puedes poner 'push'
    types:
      completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Autenticarse en Azure
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 2. Desplegar / Actualizar el contenedor en ACI
    - name: Deploy to Azure Container Instance
      uses: azure/aci-deploy@v1
      with:
        resource-group: tu-grupo-de-recursos         # Cambia por el nombre de tu Resource Group
        dns-name-label: fabi-manager-app             # El subdominio para acceder a tu app (.southcentralus.azurecontainer.io)
        image: proyectofinalacr.azurecr.io/fabi-manager:4dd8f2fe165308ed1375de97844e61469395aeca
        registry-login-server: proyectofinalacr.azurecr.io
        registry-username: ${{ secrets.REGISTRY_USERNAME }}
        registry-password: ${{ secrets.REGISTRY_PASSWORD }}
        name: fabi-manager-container                 # Nombre de la instancia en ACI
        location: eastus                             # La región de tu infraestructura
        ports: 80                                    # Cambia al puerto que use tu app interna (ej: 80, 3000, 8080)
        environment-variables: |                     # Configurar variables de entorno necesarias
          NODE_ENV=production
          PORT=80

    # 3. Validar que la aplicación responda (Smoke Test)
    - name: Validar acceso a la aplicación
      run: |
        echo "Esperando a que el contenedor inicie..."
        sleep 15
        curl -f http://fabi-manager-app.eastus.azurecontainer.io || exit 1
Desglose de lo que hace este flujo según tus requerimientos:
Seleccionar la imagen y versión: Ya la tienes identificada explícitamente en los datos que te pasaron (proyectofinalacr.azurecr.io/fabi-manager:4dd8f2fe165308ed1375de97844e61469395aeca). En un entorno real automatizado, puedes cambiar el tag fijo por una variable como ${{ github.sha }}.

Crear o actualizar el contenedor en ACI: La acción oficial de Microsoft azure/aci-deploy@v1 se encarga de buscar si el contenedor ya existe para actualizarlo con la nueva imagen o crearlo desde cero si no existe.

Configurar variables de entorno: Se realiza bajo el parámetro environment-variables. Asegúrate de poner ahí las que tu aplicación requiera para conectar con bases de datos u otros servicios.

Validar funcionamiento: El último paso usa un comando curl hacia la URL pública asignada a tu ACI para comprobar que responda correctamente (un código HTTP 200). Si el comando falla, el pipeline se marcará como fallido.

dame los pasos a detalle que debo seguir para hacer el pipeline.

Para implementar a detalle el Pipeline 3: Despliegue, estructuraremos la solución utilizando GitHub Actions, ya que estás usando un repositorio de GitHub para el proyecto.

Asumiendo que la infraestructura (VNet, ACR) ya fue creada en el paso 1, sigue esta guía paso a paso para configurar tu flujo de automatización:

Paso 1: Configurar el Service Principal en Azure (Permisos)
Para que GitHub pueda entrar a tu cuenta de Azure y desplegar el contenedor, necesita credenciales.

Abre la terminal de Azure (Azure CLI) o tu consola local y ejecuta el siguiente comando reemplazando los datos de tu suscripción y grupo de recursos:

Bash
az ad sp create-for-rbac --name "github-actions-deploy-sp" --role contributor --scopes /subscriptions/TU_SUB_ID/resourceGroups/TU_GRUPO_DE_RECURSOS --json-auth
Este comando te devolverá un bloque de texto en formato JSON. Cópialo completo.

Paso 2: Guardar los Secretos en GitHub
Por seguridad, no debes escribir contraseñas ni tokens directamente en el código del pipeline.

Ve a tu repositorio de GitHub ([https://github.com/balgxmr/fabi-manager-2026](https://github.com/balgxmr/fabi-manager-2026)).

Haz clic en Settings (Configuración) > Secrets and variables > Actions.

Añade los siguientes Repository secrets haciendo clic en New repository secret:

Nombre del Secreto	Valor / Contenido
AZURE_CREDENTIALS	Pega aquí el JSON completo que copiaste en el Paso 1.
ACR_USERNAME	El nombre de usuario de tu Azure Container Registry (generalmente es proyectofinalacr).
ACR_PASSWORD	La contraseña de administrador de tu ACR (la encuentras en el portal de Azure dentro de tu ACR > Access keys o Claves de acceso).
Paso 3: Crear el Archivo del Pipeline en tu Código
Debes definir el flujo de trabajo en la ruta correcta de tu repositorio.

En la raíz de tu proyecto local o directamente desde la interfaz web de GitHub, crea la siguiente estructura de carpetas si no existe: .github/workflows/

Dentro de esa carpeta, crea un archivo llamado deploy-aci.yml.

Paso 4: Escribir el Flujo de Trabajo (Código del Pipeline)
Copia y pega el siguiente contenido dentro de .github/workflows/deploy-aci.yml. Este archivo está diseñado para cumplir estrictamente con cada uno de los puntos que te solicita la rúbrica de tu asignación:

YAML
name: Pipeline 3 - Despliegue a ACI

# Controla cuándo se ejecuta el pipeline (en este caso, de forma manual o automática tras el empuje)
on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions de GitHub

jobs:
  despliegue-aci:
    runs-on: ubuntu-latest

    steps:
    # REQUERIMIENTO 1: Seleccionar la imagen y versión almacenada en ACR
    # Usamos las variables correspondientes a tu contenedor y el tag específico provisto
    - name: Definir variables del contenedor
      run: |
        echo "IMAGE_NAME=proyectofinalacr.azurecr.io/fabi-manager:4dd8f2fe165308ed1375de97844e61469395aeca" >> $GITHUB_ENV
        echo "CONTAINER_NAME=fabi-manager-service" >> $GITHUB_ENV

    # Conexión inicial segura a Azure usando el Service Principal guardado
    - name: Autenticación en Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # REQUERIMIENTO 2 Y 3: Crear o actualizar el contenedor en ACI y configurar variables de entorno
    - name: Desplegar en Azure Container Instances (ACI)
      uses: azure/aci-deploy@v1
      with:
        resource-group: tu-grupo-de-recursos-aquí     # REEMPLAZA con el nombre de tu Resource Group en Azure
        name: ${{ env.CONTAINER_NAME }}
        image: ${{ env.IMAGE_NAME }}
        registry-login-server: proyectofinalacr.azurecr.io
        registry-username: ${{ secrets.ACR_USERNAME }}
        registry-password: ${{ secrets.ACR_PASSWORD }}
        location: eastus                             # REEMPLAZA con la región donde creaste tu VNet (ej. eastus, southcentralus)
        ports: 80                                    # El puerto en el que escucha tu aplicación (ej: 80, 3000, 8080)
        dns-name-label: fabi-manager-app-2026        # Nombre único para generar tu URL pública
        # REQUERIMIENTO 3: Configurar variables de entorno necesarias para tu app
        environment-variables: |
          NODE_ENV=production
          PORT=80
        # Si requieres integrarlo a la VNet del Punto 1, añade estas líneas descomentadas:
        # vnet: nombre-de-tu-vnet
        # subnet: nombre-de-tu-subred

    # REQUERIMIENTO 4 Y 5: Verificar ejecución y validar que la aplicación sea accesible (Smoke Test)
    - name: Validar estado y accesibilidad de la aplicación
      run: |
        echo "Esperando 20 segundos a que el contenedor inicie por completo..."
        sleep 20
        
        # Validar el estado consultando a Azure CLI
        echo "Verificando estado del contenedor en Azure..."
        CONTAINER_STATE=$(az container show --resource-group tu-grupo-de-recursos-aquí --name ${{ env.CONTAINER_NAME }} --query "instanceView.state" -o tsv)
        echo "Estado actual: $CONTAINER_STATE"
        
        if [ "$CONTAINER_STATE" != "Running" ]; then
          echo "Error: El contenedor no se encuentra en estado Running."
          exit 1
        fi
        
        # Validar que responda solicitudes HTTP de forma correcta
        echo "Realizando prueba de conectividad HTTP (Smoke Test)..."
        URL_APP="http://fabi-manager-app-2026.eastus.azurecontainer.io" # Ajusta según tu dns-name-label y región
        
        # Realiza un curl y verifica que no devuelva un error del servidor
        curl -f -s -I $URL_APP | head -n 1
        echo "¡Despliegue y validación completados con éxito!"
