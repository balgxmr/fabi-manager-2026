name: Pipeline 3 - Despliegue Independiente ACI

on:
  push:
    branches:
      - main
  workflow_dispatch: # Te sigue dejando el botón manual por si acaso

jobs:
  deploy-to-aci:
    runs-on: ubuntu-latest
    steps:

    # Desplegar el contenedor directamente usando solo las credenciales del ACR
    - name: Desplegar contenedor en Azure Container Instances
      uses: azure/aci-deploy@v1
      with:
        resource-group: ProyectoFinalTopicos
        location: eastus2
        vnet: proyectofinal-vnet
        subnet: proyectofinal-subnet-aci                                  
        name: fabi-manager-service
        image: proyectofinalacr.azurecr.io/fabi-manager:4dd8f2fe165308ed1375de97844e61469395aeca
        registry-login-server: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
        registry-username: ${{ secrets.AZURE_ACR_USERNAME }}
        registry-password: ${{ secrets.AZURE_ACR_PASSWORD }}
        ports: 80                                        
        dns-name-label: fabi-manager-app-2026            
        environment-variables: |                         
          NODE_ENV=production
          PORT=80

    # Validar acceso HTTP
    - name: Validar acceso HTTP (Smoke Test)
      run: |
        echo "Esperando 20 segundos a que el contenedor termine de levantar..."
        sleep 20
        curl -f http://fabi-manager-app-2026.eastus2.azurecontainer.io || exit 1
        echo "¡Aplicación desplegada y respondiendo con éxito!"
