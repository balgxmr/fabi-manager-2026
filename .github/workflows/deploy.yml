name: "Pipeline 3: Despliegue a ACI"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================================
      # DESPLIEGUE DIRECTO USANDO CREDENCIALES DEL REGISTRO (ACR)
      # =========================================================================
      - name: Deploy to Azure Container Instances (ACI)
        uses: azure/aci-deploy@v1
        with:
          # Parámetros del recurso objetivo
          resource-group: ProyectoFinalTopicos
          location: eastus2
          name: proyectofinal-aci
          
          # Integración de red con tu infraestructura base
          vnet: proyectofinal-vnet               
          subnet: proyectofinal-subnet-aci       
          
          # Autenticación directa contra el Registro de Contenedores
          image: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/fabi-manager:${{ github.sha }}
          registry-login-server: ${{ secrets.AZURE_ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.AZURE_ACR_USERNAME }}
          registry-password: ${{ secrets.AZURE_ACR_PASSWORD }}
          ports: 80                                        
          environment-variables: |                         
            NODE_ENV=production
            PORT=80
