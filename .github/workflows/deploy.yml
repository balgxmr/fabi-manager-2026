donde encuentro la vnet y la subnet

Para encontrar los nombres exactos de tu VNet (Red Virtual) y tu Subred, debes buscarlos dentro del Portal de Azure. Sigue estos pasos rápidos:

Opción 1: Desde tu Grupo de Recursos (La forma más rápida)
Entra al Portal de Azure.

En la barra de búsqueda de arriba, escribe el nombre de tu Grupo de Recursos (Resource Group) y selecciónalo.

En la lista de recursos que aparecerá al centro de la pantalla, busca el tipo de recurso que se llama Virtual network (Red virtual).

El texto que aparece bajo la columna Name (Nombre) es tu vnet. (Copia ese nombre).

Opción 2: Para encontrar la Subnet (Subred)
Una vez que tienes localizada tu VNet:

Haz clic sobre el nombre de tu Virtual network para entrar a sus detalles.

En el menú de la izquierda, bajo la sección Settings (Configuración), haz clic en Subnets (Subredes).

Verás una lista de subredes disponibles. Identifica cuál es la subred que creaste en el paso 1 específicamente para desplegar el contenedor (según tu rúbrica).

El nombre que aparece en esa lista es tu subnet.

💡 Una alternativa por si usaste Terraform en el Paso 1
Como la descripción del Pipeline 1 mencionaba usar Terraform, puedes encontrar estos nombres directamente en tus archivos de código de Terraform (.tf):

El nombre de la VNet estará en el argumento name dentro del bloque resource "azurerm_virtual_network" "...".

El nombre de la subred estará en el argumento name dentro del bloque resource "azurerm_subnet" "...".

