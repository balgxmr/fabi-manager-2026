name: "Pipeline 3: Actualización de ACI Existente"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================================
      # DIAGNÓSTICO E INYECCIÓN DE IMAGEN
      # =========================================================================
      - name: Forzar Actualización de Imagen en ACI Existente
        run: |
          set -x  # <--- ESTO NOS MOSTRARÁ EL ERROR REAL EN EL LOG
          echo "Ejecutando actualización contra ACI..."
          
          az container create \
            --resource-group "ProyectoFinalTopicos" \
            --name "proyectofinal-aci" \
            --image "proyectofinalacr.azurecr.io/fabi-manager:${{ github.sha }}" \
            --registry-login-server "proyectofinalacr.azurecr.io" \
            --registry-username "proyectofinalacr" \
            --registry-password "FLw2Nffa8O1BvOo9JgeTYrrOpcFpKxgSJeCex" \
            --vnet "proyectofinal-vnet" \
            --subnet "proyectofinal-subnet-aci" \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5 \
            --ports 80 \
            --location eastus2
