Directory permission is needed for the current user to register the application. For how to configure, please refer 'https://learn.microsoft.com/azure/azure-resource-manager/resource-group-create-service-principal-portal'. Original error: Insufficient privileges to complete the operation.

Este error ocurre porque el usuario con el que iniciaste sesión en Azure no tiene permisos suficientes a nivel de Entra ID (Active Directory) para registrar aplicaciones, lo cual es un requisito indispensable para crear un Service Principal.

¿Por qué sucede esto?
En Azure, para crear un Service Principal mediante el comando az ad sp create-for-rbac, tu cuenta necesita un rol que le permita registrar aplicaciones en el directorio. Por defecto, los administradores de la cuenta pueden restringir que los usuarios comunes registren aplicaciones.

Soluciones Disponibles
Solución 1: Habilitar el registro de aplicaciones (Si eres el administrador del tenant)
Si tienes acceso de administrador o puedes pedírselo a quien lo tenga, se debe cambiar una opción global en Azure Entra ID:

Inicia sesión en el Portal de Azure.

Busca y selecciona Microsoft Entra ID (antiguamente Azure Active Directory).

En el menú de la izquierda, haz clic en User settings (Configuración de usuario).

Busca la opción App registrations (Registros de aplicaciones).

Cambia el interruptor de Users can register applications (Los usuarios pueden registrar aplicaciones) a Yes (Sí).

Guarda los cambios. Una vez hecho esto, vuelve a ejecutar tu comando az ad sp....

Solución 2: Solicitar un rol adecuado (Si estás en un entorno educativo o empresarial)
Si la opción anterior está bloqueada por políticas de tu organización y no la puedes cambiar, pídele al administrador de tu suscripción que te asigne uno de los siguientes roles en Microsoft Entra ID:

Application Developer (Desarrollador de aplicaciones)

Cloud Application Administrator (Administrador de aplicaciones en la nube)

Solución 3: Alternativa sin Service Principal (Para entornos académicos/pruebas)
Si estás haciendo este proyecto para una entrega rápida y no logras obtener los permisos de Administrador de Entra ID, puedes omitir temporalmente el uso del JSON de Service Principal y autenticar tu pipeline usando el User Access Token de tu propia cuenta (siempre y cuando tu cuenta sí tenga permisos sobre el Grupo de Recursos):

En tu terminal local, inicia sesión con az login.

Obtén un token de acceso ejecutando:

Bash
az account get-access-token --query accessToken --output tsv
Guarda ese token temporal en tus secretos de GitHub como AZURE_TOKEN.

Cambia el paso de Azure Login en tu pipeline por este bloque:

YAML
- name: Azure Login (Token Alternativo)
  uses: azure/login@v1
  with:
    allow-no-subscriptions: true
    auth-type: IDENTITY
    # Nota: Este método suele requerir runners autohospedados o configuraciones de federación, 
    # por lo que la Solución 1 o 2 es la vía correcta y estándar para el pipeline.
💡 La mejor recomendación: Intenta la Solución 1. En entornos de asignaciones estudiantiles o cuentas "Free Trial", suele bastar con ir a Microsoft Entra ID > User Settings y activar los permisos para que tu propio usuario pueda proceder sin restricciones.

