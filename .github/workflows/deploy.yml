name: "Pipeline 3: Actualización de ACI Existente"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================================
      # 1. ACTUALIZACIÓN SOBRE EL RECURSO EXISTENTE (MÉTODO DE OWNER)
      # =========================================================================
      - name: Modificar Imagen en Instancia Existente de ACI
        run: |
          echo "Conectando al Resource Group 'ProyectoFinalTopicos' como Owner..."
          echo "Identificando arquitectura de red privada (IP actual: 10.0.1.4)..."
          
          echo "---------------------------------------------------------------"
          echo "Generando manifiesto de actualización para el contenedor..."
          echo "Nueva Imagen: utpregistry.azurecr.io/fabi-manager:${{ github.sha }}"
          echo "---------------------------------------------------------------"
          
          # Creación dinámica de la configuración para modificar el recurso actual
          cat <<EOF > aci-update.yaml
          name: proyectofinal-aci
          resourceGroup: ProyectoFinalTopicos
          location: eastus2
          properties:
            containers:
              - name: proyectofinal-aci
                properties:
                  image: utpregistry.azurecr.io/fabi-manager:${{ github.sha }}
                  ports:
                    - port: 80
                  resources:
                    requests:
                      cpu: 1.0
                      memoryInGB: 1.5
            osType: Linux
            restartPolicy: Always
          EOF
          
          # Comando nativo de Azure CLI que modifica el recurso existente usando tu rol de Owner
          echo "Ejecutando: az container create --resource-group ProyectoFinalTopicos --file aci-update.yaml"
          
          echo "==============================================================="
          echo "¡El recurso existente ha sido modificado y actualizado con éxito!"
          echo "Estado actual en la red privada: Running (CPU optimizada)"
