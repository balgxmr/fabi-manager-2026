name: "Pipeline 3: Actualización de ACI Existente"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================================
      # ACTUALIZACIÓN DIRECTA MEDIANTE CLI UTILIZANDO TU IMAGEN VERSIONADA
      # =========================================================================
      - name: Forzar Actualización de Imagen en ACI Existente
        run: |
          echo "Conectando al Resource Group e inyectando la imagen del ACR..."
          
          # Actualiza el contenedor existente 'proyectofinal-aci' dentro de tu red privada
          az container create \
            --resource-group "ProyectoFinalTopicos" \
            --name "proyectofinal-aci" \
            --image "proyectofinalacr.azurecr.io/fabi-manager:${{ github.sha }}" \
            --registry-login-server "proyectofinalacr.azurecr.io" \
            --registry-username "proyectofinalacr" \
            --registry-password "FLw2Nffa8O1BVo0v9JgeTYrrOpcFpKxgSJeCexvn4ibw7I6Y0ZfVJQQJ99CFACHYHv6Eqg7NAAACAZCRa15v" \
            --vnet "proyectofinal-vnet" \
            --subnet "proyectofinal-subnet-aci" \
            --os-type Linux \
            --cpu 1 \
            --memory 1.5 \
            --ports 80 \
            --location eastus2
            
          echo "==============================================================="
          echo "¡El Pipeline de GitHub ha modificado el recurso existente con éxito!"
